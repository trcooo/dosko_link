[build]
# Railpack is Railway's default builder.
builder = "RAILPACK"
# For Python, Railpack usually detects this automatically, but we pin it for clarity.
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=*"
healthcheckPath = "/health"
